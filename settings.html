<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan - Portal OSN</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a; /* Biru dongker gelap ala mode admin */
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-settings {
            background: #1e293b;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border-top: 5px solid #ef4444;
        }
    </style>
</head>
<body>

    <div class="card-settings">
        <i class="fas fa-cog fa-4x text-secondary mb-4"></i>
        <h2 class="fw-bold text-white mb-3">Pengaturan Sistem</h2>
        <p class="text-light opacity-75 mb-4">Anda dapat menghapus data sesi (profil dan peran) yang tersimpan di perangkat ini untuk memulai ulang aplikasi dari awal.</p>
        
        <button class="btn btn-danger btn-lg w-100 fw-bold rounded-pill mb-3 shadow" onclick="hapusSesi()">
            <i class="fas fa-trash-alt me-2"></i> Hapus Data & Reset Sesi
        </button>
        
        <a href="index.html" class="btn btn-outline-light btn-lg w-100 fw-bold rounded-pill">
            <i class="fas fa-arrow-left me-2"></i> Kembali ke Menu
        </a>
    </div>

    <script>
        function hapusSesi() {
            Swal.fire({
                title: 'Apakah Anda yakin?',
                text: "Semua memori profil dan pilihan peran di perangkat ini akan dihapus!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#475569',
                confirmButtonText: 'Ya, Hapus!',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.clear(); // Menghapus seluruh localStorage
                    Swal.fire(
                        'Dihapus!',
                        'Data sesi berhasil direset.',
                        'success'
                    ).then(() => {
                        window.location.href = 'index.html'; // Kembalikan ke menu utama
                    });
                }
            })
        }
    </script>
</body>
</html>
