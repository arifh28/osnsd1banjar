<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balapan MTK - OSN</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; 
            user-select: none; 
            background-color: #0f172a;
        }

        /* WARNING PORTRAIT */
        #portrait-warning { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f172a; z-index: 9999; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; padding: 20px; color: white;
        }
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex; }
            #main-app { display: none !important; }
        }

        /* SCREENS */
        #screen-mode, #screen-countdown { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #0f172a; z-index: 2000; color: white;
        }
        #screen-countdown { display: none; background: rgba(15, 23, 42, 0.95); }
        #screen-game { display: none; flex-direction: column; height: 100vh; width: 100%; }

        /* --- SCREEN 1: PILIH MODE (SESUAI SCREENSHOT) --- */
        #screen-mode { background: #f8fafc; color: #1e293b; padding: 20px; }
        .mode-header { text-align: center; margin-bottom: 30px; }
        .mode-header h1 { font-weight: 900; color: #334155; margin-bottom: 5px; font-size: 2.5rem; }
        .mode-header h3 { font-weight: 700; color: #64748b; }
        
        .mode-grid {
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; 
            max-width: 900px; width: 100%;
        }
        .btn-mode {
            background: #f1f5f9; border: 2px solid #e2e8f0; border-radius: 15px;
            padding: 20px 10px; text-align: center; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            aspect-ratio: 1 / 1;
        }
        .btn-mode:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 15px rgba(59,130,246,0.2); background: white; }
        .btn-mode:active { transform: scale(0.95); }
        .mode-icon { font-size: 3.5rem; font-weight: 900; color: #475569; margin-bottom: 10px; line-height: 1; font-family: 'Arial', sans-serif;}
        .mode-text { font-size: 1.1rem; font-weight: 700; color: #1e293b; }

        .btn-back-menu {
            position: absolute; top: 20px; left: 20px;
            font-weight: bold; border-radius: 50px;
        }

        /* --- SCREEN 2: COUNTDOWN ANIMATION --- */
        #countdown-number { 
            font-size: 15rem; font-weight: 900; color: #facc15; 
            text-shadow: 0 0 50px rgba(250, 204, 21, 0.5); animation: zoomInOut 1s infinite;
        }
        @keyframes zoomInOut { 
            0% { transform: scale(0.5); opacity: 0; } 
            50% { transform: scale(1.2); opacity: 1; } 
            100% { transform: scale(1); opacity: 0; } 
        }

        /* --- SCREEN 3: AREA BALAPAN (ATAS) --- */
        .track-area {
            height: 30vh; background-color: #1e293b; display: flex; flex-direction: column;
            position: relative; border-bottom: 6px solid #fbbf24; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 10;
        }
        .lane { flex: 1; position: relative; border-bottom: 3px dashed #475569; display: flex; align-items: center; }
        .lane:last-child { border-bottom: none; }
        
        .player-avatar {
            height: 70%; position: absolute; left: 2%; transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
            z-index: 5; filter: drop-shadow(4px 4px 5px rgba(0,0,0,0.5)); object-fit: contain;
        }
        .finish-line {
            position: absolute; right: 5%; top: 0; bottom: 0; width: 20px;
            background: repeating-linear-gradient(to bottom, #ffffff 0, #ffffff 15px, #000000 15px, #000000 30px);
            z-index: 2; border-left: 2px solid #ef4444;
        }

        /* --- SCREEN 3: AREA SOAL (BAWAH) --- */
        .quiz-area { height: 70vh; display: flex; background: #f8fafc; }
        .player-col { flex: 1; height: 100%; display: flex; flex-direction: column; padding: 20px; border-right: 4px solid #cbd5e1; }
        .player-col:last-child { border-right: none; }
        
        .p1-zone { background-color: #eff6ff; } /* Biru Muda */
        .p2-zone { background-color: #fef2f2; } /* Merah Muda */
        .bg-p1 { background-color: #3b82f6; } 
        .bg-p2 { background-color: #ef4444; } 

        .score-badge {
            font-size: 1.5rem; font-weight: 900; padding: 10px 20px; border-radius: 50px;
            text-align: center; margin-bottom: 15px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .question-box {
            flex: 1; background: white; border-radius: 15px; padding: 20px; font-size: 4rem;
            font-weight: 900; color: #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px;
            display: flex; align-items: center; text-align: center; justify-content: center; border: 2px solid #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
        }
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 40%; }
        .opt-btn {
            border: 2px solid #cbd5e1; background: white; border-radius: 15px; font-size: 2.5rem;
            font-weight: 900; color: #334155; transition: 0.1s; box-shadow: 0 6px 0 #cbd5e1;
            display: flex; align-items: center; justify-content: center; text-align: center;
            font-family: 'Courier New', Courier, monospace;
        }
        .opt-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #cbd5e1; }
        
        .opt-btn.correct { background-color: #22c55e !important; color: white !important; border-color: #16a34a !important; box-shadow: 0 6px 0 #16a34a !important; }
        .opt-btn.wrong { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; box-shadow: 0 6px 0 #dc2626 !important; }
    </style>
</head>
<body>

    <div id="portrait-warning">
        <i class="fas fa-mobile-alt fa-5x mb-4" style="transform: rotate(90deg); color: #facc15;"></i>
        <h1 class="fw-bold">PUTAR LAYAR ANDA!</h1>
        <p class="fs-4">Game ini hanya dapat dimainkan dalam mode Landscape.</p>
    </div>

    <div id="main-app">
        
        <div id="screen-mode">
            <a href="index.html" class="btn btn-outline-secondary btn-back-menu"><i class="fas fa-arrow-left me-2"></i> KEMBALI</a>
            
            <div class="mode-header">
                <h1>Balapan Matematika</h1>
                <h3>Pilih Mode Permainan</h3>
            </div>
            
            <div class="mode-grid">
                <div class="btn-mode" onclick="pilihMode('tambah')">
                    <div class="mode-icon">+</div><div class="mode-text">Tambah</div>
                </div>
                <div class="btn-mode" onclick="pilihMode('kurang')">
                    <div class="mode-icon">−</div><div class="mode-text">Kurang</div>
                </div>
                <div class="btn-mode" onclick="pilihMode('kali')">
                    <div class="mode-icon">×</div><div class="mode-text">Kali</div>
                </div>
                <div class="btn-mode" onclick="pilihMode('bagi')">
                    <div class="mode-icon">÷</div><div class="mode-text">Bagi</div>
                </div>
                <div class="btn-mode" onclick="pilihMode('campuran')">
                    <div class="mode-icon">±</div><div class="mode-text">+-×÷</div>
                </div>
                
                <div class="btn-mode" onclick="pilihMode('pangkat2')">
                    <div class="mode-icon">x²</div><div class="mode-text">Pangkat 2</div>
                </div>
                <div class="btn-mode" onclick="pilihMode('akar')">
                    <div class="mode-icon">√</div><div class="mode-text">Akar</div>
                </div>
                <div class="btn-mode" onclick="pilihMode('fpb')">
                    <div class="mode-icon" style="font-size:2.5rem;">FPB</div><div class="mode-text">FPB</div>
                </div>
                <div class="btn-mode" onclick="pilihMode('kpk')">
                    <div class="mode-icon" style="font-size:2.5rem;">KPK</div><div class="mode-text">KPK</div>
                </div>
                <div class="btn-mode" onclick="pilihMode('campuran_hard')">
                    <div class="mode-icon">?</div><div class="mode-text">Semua Mode</div>
                </div>
            </div>
        </div>

        <div id="screen-countdown">
            <div id="countdown-number">3</div>
        </div>

        <div id="screen-game">
            <div class="track-area">
                <div class="finish-line"></div>
                <div class="lane" id="lane-1">
                    <span class="badge bg-primary ms-3 fs-5 z-3 position-absolute">P1</span>
                    <img src="/images/player1.png" class="player-avatar" id="avatar-1" onerror="this.src='https://ui-avatars.com/api/?name=P+1&background=3b82f6&color=fff&rounded=true'">
                </div>
                <div class="lane" id="lane-2">
                    <span class="badge bg-danger ms-3 fs-5 z-3 position-absolute">P2</span>
                    <img src="/images/player2.png" class="player-avatar" id="avatar-2" onerror="this.src='https://ui-avatars.com/api/?name=P+2&background=ef4444&color=fff&rounded=true'">
                </div>
            </div>

            <div class="quiz-area">
                <div class="player-col p1-zone" id="zone-1">
                    <div class="score-badge bg-p1" id="score-1">PLAYER 1: 0 / 10</div>
                    <div class="question-box" id="q-text-1">Siap...</div>
                    <div class="options-container" id="opts-1"></div>
                </div>

                <div class="player-col p2-zone" id="zone-2">
                    <div class="score-badge bg-p2" id="score-2">PLAYER 2: 0 / 10</div>
                    <div class="question-box" id="q-text-2">Siap...</div>
                    <div class="options-container" id="opts-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WIN_SCORE = 10; // Cukup 10 agar cepat
        let isGameOver = false;
        let selectedMode = 'tambah';

        let players = [
            { id: 1, name: "PLAYER 1", score: 0, currentAnswer: null, isLocked: false },
            { id: 2, name: "PLAYER 2", score: 0, currentAnswer: null, isLocked: false }
        ];

        // LOGIKA PEMILIHAN MODE -> COUNTDOWN
        function pilihMode(mode) {
            selectedMode = mode;
            document.getElementById('screen-mode').style.display = 'none';
            document.getElementById('screen-countdown').style.display = 'flex';
            
            document.getElementById('score-1').innerText = `PLAYER 1: 0 / ${WIN_SCORE}`;
            document.getElementById('score-2').innerText = `PLAYER 2: 0 / ${WIN_SCORE}`;
            
            let hitung = 3;
            const angkaEl = document.getElementById('countdown-number');
            angkaEl.innerText = hitung;
            angkaEl.style.color = "#facc15";
            
            const timer = setInterval(() => {
                hitung--;
                if(hitung > 0) {
                    angkaEl.innerText = hitung;
                } else if(hitung === 0) {
                    angkaEl.innerText = "GO!";
                    angkaEl.style.color = "#22c55e";
                } else {
                    clearInterval(timer);
                    document.getElementById('screen-countdown').style.display = 'none';
                    document.getElementById('screen-game').style.display = 'flex';
                    renderQuestion(1);
                    renderQuestion(2);
                }
            }, 1000);
        }

        // FUNGSI MATEMATIKA OTOMATIS (TanPA JSON)
        function getGCD(a, b) { return b === 0 ? a : getGCD(b, a % b); }
        function getLCM(a, b) { return (a * b) / getGCD(a, b); }

        function generateMathProblem(mode) {
            let qText = "", ans = 0;
            let m = mode;

            // Jika campuran, pilih mode secara acak
            if(m === 'campuran') {
                const modes = ['tambah', 'kurang', 'kali', 'bagi'];
                m = modes[Math.floor(Math.random() * modes.length)];
            } else if (m === 'campuran_hard') {
                const modes = ['tambah', 'kurang', 'kali', 'bagi', 'pangkat2', 'akar', 'fpb', 'kpk'];
                m = modes[Math.floor(Math.random() * modes.length)];
            }

            if (m === 'tambah') {
                let a = Math.floor(Math.random() * 50) + 10;
                let b = Math.floor(Math.random() * 50) + 10;
                qText = `${a} + ${b}`; ans = a + b;
            } 
            else if (m === 'kurang') {
                let a = Math.floor(Math.random() * 50) + 20;
                let b = Math.floor(Math.random() * a); // a selalu lebih besar
                qText = `${a} − ${b}`; ans = a - b;
            } 
            else if (m === 'kali') {
                let a = Math.floor(Math.random() * 12) + 2;
                let b = Math.floor(Math.random() * 12) + 2;
                qText = `${a} × ${b}`; ans = a * b;
            } 
            else if (m === 'bagi') {
                let b = Math.floor(Math.random() * 10) + 2;
                let ansTemp = Math.floor(Math.random() * 10) + 2;
                let a = b * ansTemp; // Pastikan habis dibagi
                qText = `${a} ÷ ${b}`; ans = ansTemp;
            }
            else if (m === 'pangkat2') {
                let a = Math.floor(Math.random() * 15) + 2;
                qText = `${a}²`; ans = a * a;
            }
            else if (m === 'akar') {
                let ansTemp = Math.floor(Math.random() * 15) + 2;
                let a = ansTemp * ansTemp;
                qText = `√${a}`; ans = ansTemp;
            }
            else if (m === 'fpb') {
                let pool = [12, 16, 18, 20, 24, 30, 36, 40];
                let a = pool[Math.floor(Math.random() * pool.length)];
                let b = pool[Math.floor(Math.random() * pool.length)];
                if(a===b) b += 4;
                qText = `FPB(${a}, ${b})`; ans = getGCD(a, b);
            }
            else if (m === 'kpk') {
                let pool = [4, 6, 8, 10, 12];
                let a = pool[Math.floor(Math.random() * pool.length)];
                let b = pool[Math.floor(Math.random() * pool.length)];
                if(a===b) b += 2;
                qText = `KPK(${a}, ${b})`; ans = getLCM(a, b);
            }

            // BUAT JAWABAN PENGECCOH (Mirip tapi salah)
            let choices = [ans];
            while (choices.length < 4) {
                let off = Math.random() > 0.5 ? 1 : 10;
                if(Math.random() > 0.7) off = 2;
                
                let wrong = Math.random() > 0.5 ? ans + off : ans - off;
                if (wrong > 0 && !choices.includes(wrong)) {
                    choices.push(wrong);
                }
            }
            choices = choices.sort(() => 0.5 - Math.random());

            return { question: qText, answer: ans, options: choices };
        }

        function renderQuestion(pid) {
            const player = players[pid - 1];
            const problem = generateMathProblem(selectedMode);
            
            player.currentAnswer = problem.answer;
            document.getElementById(`q-text-${pid}`).innerText = problem.question;
            
            let optsHtml = '';
            problem.options.forEach(val => {
                optsHtml += `
                    <button class="opt-btn" onclick="handleAnswer(${pid}, ${val}, this)">
                        ${val}
                    </button>
                `;
            });

            document.getElementById(`opts-${pid}`).innerHTML = optsHtml;
            player.isLocked = false; 
        }

        function handleAnswer(pid, selectedVal, btnElement) {
            if (isGameOver) return;
            
            const player = players[pid - 1];
            if (player.isLocked) return; 
            
            player.isLocked = true;
            const isCorrect = (selectedVal === player.currentAnswer);

            const allBtns = document.getElementById(`opts-${pid}`).querySelectorAll('.opt-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (isCorrect) {
                btnElement.classList.add('correct');
                player.score++;
                
                document.getElementById(`score-${pid}`).innerText = `${player.name}: ${player.score} / ${WIN_SCORE}`;
                
                const movePercent = (player.score / WIN_SCORE) * 90;
                document.getElementById(`avatar-${pid}`).style.left = `${movePercent}%`;

                if (player.score >= WIN_SCORE) {
                    triggerWin(pid);
                    return;
                }
            } else {
                btnElement.classList.add('wrong');
                allBtns.forEach(b => {
                    if(parseInt(b.innerText) === player.currentAnswer) {
                        b.classList.add('correct');
                    }
                });
            }

            setTimeout(() => {
                renderQuestion(pid);
            }, 1000);
        }

        function triggerWin(pid) {
            isGameOver = true;
            let color = pid === 1 ? "#3b82f6" : "#ef4444"; 
            
            Swal.fire({
                title: `${players[pid - 1].name} MENANG!`,
                text: "Kecepatan menghitung yang luar biasa!",
                icon: 'success',
                confirmButtonColor: color,
                confirmButtonText: 'Main Lagi',
                allowOutsideClick: false
            }).then(() => {
                location.reload();
            });
        }
    </script>
</body>
</html>
