<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Peserta - Portal OSN</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a; 
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-settings {
            background: #1e293b;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border-top: 5px solid #facc15;
        }
    </style>
</head>
<body>

    <div class="card-settings">
        <i class="fas fa-user-circle fa-5x text-warning mb-4"></i>
        
        <h2 class="fw-bold text-white mb-2" id="judul-keluar">Keluar Sesi Peserta?</h2>
        
        <p class="text-light opacity-75 mb-4">Anda akan menghapus memori peserta ini dan kembali ke halaman utama.</p>
        
        <button class="btn btn-danger btn-lg w-100 fw-bold rounded-pill mb-3 shadow" onclick="hapusSesiPeserta()">
            <i class="fas fa-sign-out-alt me-2"></i> YA, KELUAR
        </button>
        
        <button class="btn btn-outline-light btn-lg w-100 fw-bold rounded-pill" onclick="window.history.back()">
            <i class="fas fa-arrow-left me-2"></i> Batal
        </button>
    </div>

    <script>
        // Ambil nama dari Local Storage
        const namaPeserta = localStorage.getItem('namaPeserta');
        if (namaPeserta) {
            document.getElementById('judul-keluar').innerHTML = `Keluar dari sesi <br><span class="text-warning">${namaPeserta}</span>?`;
        }

        function hapusSesiPeserta() {
            Swal.fire({
                title: 'Keluar dari Sesi?',
                text: "Memori peserta Anda akan dihapus.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#475569',
                confirmButtonText: 'Ya, Keluar!',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('namaPeserta');
                    localStorage.removeItem('userRole'); 
                    Swal.fire(
                        'Berhasil!',
                        'Sesi peserta telah direset.',
                        'success'
                    ).then(() => {
                        window.location.href = 'index.html'; 
                    });
                }
            })
        }
    </script>
</body>
</html>
