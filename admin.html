<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - SDN 1 Banjar</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">
    
    <!-- SweetAlert & Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- jQuery & DataTables JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .sidebar { background: #384596; min-height: 100vh; color: white; padding: 20px; transition: all 0.3s; }
        .card-stat { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* Mobile First Navbar */
        .mobile-navbar { background: #384596; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .mobile-navbar img { width: 40px; }
        
        @media (min-width: 768px) {
            .mobile-navbar { display: none; }
        }
        @media (max-width: 767.98px) {
            .sidebar { display: none; }
            .content-area { padding: 15px !important; }
        }
    </style>
</head>
<body>

<!-- Mobile Navbar -->
<div class="mobile-navbar">
    <div class="d-flex align-items-center gap-2">
        <img src="logo_sekolah.png" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=SD&background=fff&color=384596&rounded=true'">
        <h5 class="mb-0 fw-bold">ADMIN PORTAL</h5>
    </div>
    <a href="index.html" class="text-white"><i class="fas fa-home fs-4"></i></a>
</div>

<div class="container-fluid">
    <div class="row">
        <!-- Desktop Sidebar -->
        <div class="col-md-2 sidebar d-none d-md-block">
            <div class="text-center mb-4">
                <img src="logo_sekolah.png" width="60" class="mb-2" onerror="this.src='https://ui-avatars.com/api/?name=SD&background=fff&color=384596&rounded=true'">
                <h6 class="fw-bold">ADMIN PORTAL</h6>
            </div>
            <hr>
            <nav class="nav flex-column gap-2">
                <a class="nav-link text-white active" href="#"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
                <a class="nav-link text-white-50" href="index.html"><i class="fas fa-home me-2"></i> Portal Utama</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4 content-area">
            <header class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                <h2 class="fw-bold text-navy mb-0">Monitoring Ujian OSN</h2>
                <button class="btn btn-primary shadow-sm" onclick="fetchData()">
                    <i class="fas fa-sync-alt me-2"></i> Refresh Data
                </button>
            </header>

            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-12 col-md-6">
                    <div class="card card-stat p-3 bg-white border-start border-primary border-5 h-100">
                        <small class="text-secondary fw-bold">TOTAL NILAI MASUK</small>
                        <h2 class="fw-bold mb-0 text-primary" id="stat-total"><i class="fas fa-spinner fa-spin"></i></h2>
                    </div>
                </div>
                <div class="col-12 col-md-6">
                    <div class="card card-stat p-3 bg-white border-start border-success border-5 h-100">
                        <small class="text-secondary fw-bold">PESERTA AKTIF (LOGIN)</small>
                        <h2 class="fw-bold mb-0 text-success" id="stat-login"><i class="fas fa-spinner fa-spin"></i></h2>
                    </div>
                </div>
            </div>

            <!-- Tabel Hasil Ujian -->
            <div class="table-container mb-4">
                <h5 class="fw-bold mb-3"><i class="fas fa-poll text-primary me-2"></i> Hasil Ujian Siswa</h5>
                
                <!-- Filters -->
                <div class="row g-2 mb-3 bg-light p-3 rounded border">
                    <div class="col-12 col-md-6">
                        <label class="form-label fw-bold small text-secondary mb-1">Filter Mata Pelajaran</label>
                        <select id="filter-mapel" class="form-select form-select-sm shadow-none">
                            <option value="">Semua Mata Pelajaran</option>
                            <option value="IPA">IPA</option>
                            <option value="IPS">IPS</option>
                            <option value="Matematika">Matematika</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label fw-bold small text-secondary mb-1">Filter Siswa</label>
                        <select id="filter-siswa" class="form-select form-select-sm shadow-none">
                            <option value="">Semua Siswa</option>
                            <!-- Pilihan siswa diisi via JS -->
                        </select>
                    </div>
                </div>

                <table id="table-hasil" class="table table-hover table-striped align-middle dt-responsive nowrap" style="width:100%">
                    <thead class="table-dark">
                        <tr>
                            <th>Nama Peserta</th>
                            <th>Mata Pelajaran</th>
                            <th>Materi</th>
                            <th>Skor</th>
                            <th>Waktu Selesai</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-hasil">
                        <!-- Data render via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Tabel Monitoring Login -->
            <div class="table-container">
                <h5 class="fw-bold mb-4"><i class="fas fa-users text-success me-2"></i> Monitoring Login Peserta</h5>
                <table id="table-login" class="table table-hover table-striped align-middle dt-responsive nowrap" style="width:100%">
                    <thead class="table-dark">
                        <tr>
                            <th>Nama Peserta</th>
                            <th>Kunjungan Terakhir</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-login">
                        <!-- Data render via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://aqaukssuqevvvnvomarn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxYXVrc3N1cWV2dnZudm9tYXJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTEyMjAsImV4cCI6MjA5NDQyNzIyMH0.LVWVC-iO_gCz54ARtTicKKfHiNBc6vej_Dnasj98H1E';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let dtHasil;
    let dtLogin;

    // Initialize DataTables
    $(document).ready(function() {
        dtHasil = $('#table-hasil').DataTable({
            responsive: true,
            order: [[4, 'desc']], // Urutkan berdasarkan waktu selesai terbaru
            language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json' },
            columnDefs: [
                { responsivePriority: 1, targets: 0 },
                { responsivePriority: 2, targets: 3 },
                { responsivePriority: 3, targets: 6 }
            ]
        });

        dtLogin = $('#table-login').DataTable({
            responsive: true,
            order: [[1, 'desc']], // Urutkan berdasarkan kunjungan terbaru
            language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json' }
        });

        // Event listener Filter Mapel
        $('#filter-mapel').on('change', function () {
            dtHasil.column(1).search(this.value).draw();
        });

        // Event listener Filter Siswa
        $('#filter-siswa').on('change', function () {
            dtHasil.column(0).search(this.value).draw();
        });

        fetchData();
        // Auto Refresh tiap 30 detik
        setInterval(fetchData, 30000);
    });

    async function fetchData() {
        // Ambil data Hasil Ujian
        const { data: hasil, error: err1 } = await supabaseClient
            .from('peserta_ujian')
            .select('*')
            .order('waktu_pengerjaan', { ascending: false });

        // Ambil data Login
        const { data: login, error: err2 } = await supabaseClient
            .from('peserta_login')
            .select('*')
            .order('last_visit', { ascending: false });

        if (hasil) renderHasil(hasil);
        if (login) renderLogin(login);
    }

    function renderHasil(data) {
        document.getElementById('stat-total').innerText = data.length;
        
        // Populate Filter Siswa
        const uniqueSiswa = [...new Set(data.map(item => item.nama_peserta))].sort();
        const filterSiswa = document.getElementById('filter-siswa');
        const currentSiswaFilter = filterSiswa.value;
        filterSiswa.innerHTML = '<option value="">Semua Siswa</option>';
        uniqueSiswa.forEach(siswa => {
            const selected = (siswa === currentSiswaFilter) ? 'selected' : '';
            filterSiswa.innerHTML += `<option value="${siswa}" ${selected}>${siswa}</option>`;
        });

        // Clear and add rows to DataTable
        dtHasil.clear();
        data.forEach(item => {
            const date = new Date(item.waktu_pengerjaan).toLocaleString('id-ID');
            const isReset = item.is_reset;
            const statusBadge = isReset ? '<span class="badge bg-secondary">Di-reset</span>' : '<span class="badge bg-success">Valid</span>';
            const actionBtn = `<button class="btn btn-sm btn-warning fw-bold shadow-sm" onclick="resetUjian(${item.id}, '${item.nama_peserta}')" ${isReset ? 'disabled' : ''}><i class="fas fa-redo"></i> Reset</button>`;
            
            dtHasil.row.add([
                `<span class="fw-bold text-dark">${item.nama_peserta}</span>`,
                `<span class="badge border border-primary text-primary bg-white">${item.mata_pelajaran}</span>`,
                item.bagian_materi,
                `<span class="fw-bold fs-5 text-success">${item.skor}</span>`,
                `<small class="text-secondary">${date}</small>`,
                statusBadge,
                actionBtn
            ]);
        });
        
        // Draw while keeping current paging & filtering
        dtHasil.draw(false); 
    }

    function renderLogin(data) {
        document.getElementById('stat-login').innerText = data.length;

        dtLogin.clear();
        data.forEach(item => {
            const date = new Date(item.last_visit).toLocaleString('id-ID');
            dtLogin.row.add([
                `<span class="fw-bold">${item.nama}</span>`,
                `<span class="text-secondary"><i class="far fa-clock me-1"></i> ${date}</span>`
            ]);
        });
        
        dtLogin.draw(false);
    }

    async function resetUjian(id, nama) {
        const { isConfirmed } = await Swal.fire({
            title: 'Izinkan Ujian Ulang?',
            text: `Siswa "${nama}" akan diperbolehkan mengerjakan materi ini kembali.`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#f59e0b',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Ya, Reset',
            cancelButtonText: 'Batal'
        });

        if (isConfirmed) {
            const { error } = await supabaseClient
                .from('peserta_ujian')
                .update({ is_reset: true })
                .eq('id', id);

            if (!error) {
                Swal.fire({
                    title: 'Berhasil!', 
                    text: 'Siswa sekarang bisa login dan mengerjakan ulang.', 
                    icon: 'success',
                    timer: 2000,
                    showConfirmButton: false
                });
                fetchData();
            } else {
                Swal.fire('Error', 'Gagal melakukan reset.', 'error');
            }
        }
    }
</script>
</body>
</html>
